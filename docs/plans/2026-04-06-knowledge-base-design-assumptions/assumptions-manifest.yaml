  - id: ASM-11
    title: "Wikilink extension uses Node.create() vs Mention.extend()"
    category: architecture_or_design
    severity: medium
    evidence_strength: partially_supported
    assumption_statement: "Building the wikilink extension with Node.create() + @tiptap/suggestion is better than extending Mention (the pattern used by descriptorMentionExtension.ts)."
    why_it_matters: "The existing codebase uses Mention.extend() for the descriptor extension. Using a different pattern (Node.create()) means the wikilink extension won't inherit Mention's built-in behaviors and may need more manual implementation."
    supporting_evidence:
      - "Plan's technical reference recommends this approach based on research"
      - "Node.create() gives full control over node schema, avoiding Mention's assumptions"
      - "Plan explicitly says NOT to use the community tiptap-wikilink-extension"
    contradicting_evidence:
      - "descriptorMentionExtension.ts uses Mention.extend() successfully with custom trigger"
      - "Mention.extend() provides more built-in behavior with less code"
    affected_plan_sections:
      - "Wikilink Tiptap Extension"
      - "Shortcuts"
    affected_code_areas:
      - "src/features/notes/wikilinkExtension.ts (to be created)"
    validation_needed: "Confirm Node.create() + Suggestion gives sufficient control for [[double bracket]] syntax without losing features Mention provides"
    recommended_action: accept
    can_reference_harvester_help: true
    status: open

