assumptions:
  - id: ASM-1
    title: "Tiptap Suggestion supports multi-char trigger '[['"
    category: library_or_framework_capability
    severity: high
    evidence_strength: partially_supported
    assumption_statement: "The @tiptap/suggestion utility accepts a two-character trigger string `char: '[[' ` and fires the suggestion popup correctly."
    why_it_matters: "The entire wikilink autocomplete feature depends on this. If Suggestion only supports single-char triggers, the wikilink extension architecture must be redesigned."
    supporting_evidence:
      - "Plan's technical reference (kb-technical-reference.md) documents this as researched and working"
      - "Tiptap Suggestion docs show `char` parameter accepts strings"
    contradicting_evidence: []
    affected_plan_sections:
      - "Wikilink Tiptap Extension"
      - "Phase 2: Wikilinks + Reading"
    affected_code_areas:
      - "src/features/notes/wikilinkExtension.ts (to be created)"
    validation_needed: "Create a minimal Tiptap editor with Suggestion configured as `char: '[[' ` and confirm the popup fires on typing `[[`"
    recommended_action: validate
    can_reference_harvester_help: true
    status: open

  - id: ASM-2
    title: "Dexie equalsIgnoreCase() available in v4.0.10"
    category: library_or_framework_capability
    severity: medium
    evidence_strength: strongly_supported
    assumption_statement: "Dexie 4.x provides equalsIgnoreCase() on WhereClause for case-insensitive label lookups without a computed index."
    why_it_matters: "Wikilink resolution uses this for case-insensitive node lookup. If missing, need a computed lowercase index column instead."
    supporting_evidence:
      - "Dexie 4.0.10 is installed (package.json)"
      - "equalsIgnoreCase() is documented in Dexie 4 API"
      - "Plan notes 'English a-z only' limitation, suggesting awareness of scope"
    contradicting_evidence: []
    affected_plan_sections:
      - "Knowledge Base Context (useResolveWikilink)"
      - "Constraints (50ms resolution)"
    affected_code_areas:
      - "src/features/kb/KnowledgeBaseContext.tsx (to be created)"
    validation_needed: "Confirm equalsIgnoreCase() is exported from dexie 4.0.10 in node_modules"
    recommended_action: validate
    can_reference_harvester_help: true
    status: open

