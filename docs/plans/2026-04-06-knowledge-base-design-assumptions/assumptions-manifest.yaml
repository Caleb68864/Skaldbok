  - id: ASM-13
    title: "Graph queries use WHERE campaignId OR scope='shared'"
    category: architecture_or_design
    severity: medium
    evidence_strength: weakly_supported
    assumption_statement: "Extending graph queries from `WHERE campaignId = X` to `WHERE campaignId = X OR scope = 'shared'` is straightforward and performant."
    why_it_matters: "Dexie doesn't natively support OR queries on different indexed fields efficiently. This may require two separate queries merged in JS, or a compound index design."
    supporting_evidence:
      - "Plan acknowledges this query pattern change"
    contradicting_evidence:
      - "Dexie WhereClause doesn't support OR across different index fields"
      - "Would need two queries: one by campaignId, one by scope, then merge"
      - "Could impact performance for large datasets"
    affected_plan_sections:
      - "Graph Store (Dexie tables)"
      - "Open Questions #5"
    affected_code_areas:
      - "src/features/kb/KnowledgeBaseContext.tsx (to be created)"
      - "src/storage/repositories/ (all KB repositories)"
    validation_needed: "Design the Dexie query pattern — likely two .where() calls + Promise.all + dedup. Confirm this meets the 50ms constraint"
    recommended_action: validate
    can_reference_harvester_help: true
    status: open

