  - id: ASM-4
    title: "Tiptap InputRule regex works for [[wikilink]] conversion"
    category: library_or_framework_capability
    severity: medium
    evidence_strength: partially_supported
    assumption_statement: "The InputRule `/\\[\\[([^\\]]+)\\]\\]$/` correctly converts typed `[[Page Name]]` text into a wikilink atom node without the autocomplete popup."
    why_it_matters: "Provides the non-autocomplete path for creating wikilinks (typed out manually). If the regex doesn't work with Tiptap's InputRule system for atom nodes, this path is broken."
    supporting_evidence:
      - "Plan's technical reference documents this as researched"
      - "Tiptap InputRule system supports regex-based node creation"
    contradicting_evidence: []
    affected_plan_sections:
      - "Wikilink Tiptap Extension"
    affected_code_areas:
      - "src/features/notes/wikilinkExtension.ts (to be created)"
    validation_needed: "Test InputRule with atom node creation — some Tiptap InputRules only work with marks or wrapping nodes"
    recommended_action: validate
    can_reference_harvester_help: true
    status: open

  - id: ASM-5
    title: "renderNoteToMarkdown handles new wikiLink node type"
    category: architecture_or_design
    severity: medium
    evidence_strength: partially_supported
    assumption_statement: "The export pipeline (resolveWikiLinks.ts) will correctly serialize the new `wikiLink` Tiptap node type to `[[Page Name]]` markdown syntax."
    why_it_matters: "Obsidian markdown export is a hard constraint. Without updating the serializer, wikiLink nodes would fall through to the default case, which recursively serializes content — but atom nodes have no content, so wikilinks would silently disappear from exports."
    supporting_evidence:
      - "Plan explicitly identifies this as needing an update"
      - "resolveWikiLinks.ts has a clear switch/case structure easy to extend"
    contradicting_evidence:
      - "Current code has no wikiLink case — atom nodes with no content/text would serialize to empty string via default case"
    affected_plan_sections:
      - "Constraints (Backward compatibility)"
    affected_code_areas:
      - "src/utils/export/resolveWikiLinks.ts"
    validation_needed: "Confirm that adding a `case 'wikiLink'` to resolveWikiLinks.ts produces `[[label]]` output using node.attrs.label"
    recommended_action: accept
    can_reference_harvester_help: false
    status: open

  - id: ASM-6
    title: "Tiptap version mismatch in package.json"
    category: version_or_dependency
    severity: medium
    evidence_strength: partially_supported
    assumption_statement: "The Tiptap packages work correctly together despite pinned version mismatches in package.json (@tiptap/extension-link at ^2.27.2 vs others at ^2.11.7)."
    why_it_matters: "Adding @tiptap/suggestion explicitly could install a version that conflicts with the core packages. The caret ranges should resolve compatibly, but explicit version management would be safer."
    supporting_evidence:
      - "package-lock.json shows @tiptap/suggestion resolved to 2.27.2 (transitive)"
      - "Caret ranges (^2.11.7) allow resolution up to <3.0.0"
      - "App currently works, so transitive resolution is stable"
    contradicting_evidence:
      - "package.json pins vary: @tiptap/extension-link at ^2.27.2, others at ^2.11.7"
    affected_plan_sections:
      - "Wikilink Tiptap Extension"
      - "Constraints (New dependencies)"
    affected_code_areas:
      - "package.json"
    validation_needed: "Align all @tiptap/* packages to the same version range before adding @tiptap/suggestion"
    recommended_action: mitigate
    can_reference_harvester_help: false
    status: open

  - id: ASM-7
    title: "baseNoteSchema modification for scope field"
    category: data_model_or_schema
    severity: high
    evidence_strength: partially_supported
    assumption_statement: "The Note type can be extended with a `scope` field ('campaign' | 'shared') to support cross-campaign shared notes and reference note migration."
    why_it_matters: "This is a core data model change. The plan correctly flags baseNoteSchema modification as an escalation point, but it's central to the reference note migration and cross-campaign graph queries."
    supporting_evidence:
      - "Plan explicitly addresses this addition"
      - "baseNoteSchema is a Zod schema that can be extended"
      - "Dexie v7 schema change can add the index"
    contradicting_evidence:
      - "baseNoteSchema currently has no scope field"
      - "Note type has `visibility` (public/private) which is similar but distinct from scope"
      - "All existing queries filter by campaignId — adding OR scope='shared' requires touching many query sites"
    affected_plan_sections:
      - "Graph Store (Dexie tables)"
      - "Open Questions #5 (Reference Notes)"
      - "Flow 5: Dexie Migration"
    affected_code_areas:
      - "src/types/note.ts"
      - "src/storage/db/client.ts"
      - "src/storage/repositories/noteRepository.ts"
      - "All components that query notes by campaignId"
    validation_needed: "Audit all note query sites to determine how many need updating for scope='shared' support"
    recommended_action: validate
    can_reference_harvester_help: false
    status: open

  - id: ASM-8
    title: "ReferenceNote migration is small and fast enough for Dexie upgrade"
    category: performance_or_scale
    severity: medium
    evidence_strength: weakly_supported
    assumption_statement: "Migrating existing referenceNotes to the notes table in a Dexie .upgrade() block is fast enough not to noticeably delay app startup."
    why_it_matters: "Dexie upgrade blocks are synchronous and block the entire app. If users have many reference notes with large content, the migration could cause a noticeable startup delay."
    supporting_evidence:
      - "Reference notes are user-created personal notes — typically 10-50 records"
      - "Migration is a simple copy + property addition, not content transformation"
    contradicting_evidence:
      - "No telemetry or evidence of typical referenceNote counts"
      - "referenceNotes store content as string (potentially large)"
    affected_plan_sections:
      - "Flow 5: Dexie Migration"
    affected_code_areas:
      - "src/storage/db/client.ts"
    validation_needed: "Check max referenceNote content size in test data; consider adding a size guard or making migration lazy like graph population"
    recommended_action: research
    can_reference_harvester_help: false
    status: open

