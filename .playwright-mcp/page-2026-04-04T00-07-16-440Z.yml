            - generic [ref=e736]:
              - paragraph [ref=e737]: "At 0 HP: Make a CON death roll each round. 3 successes = recover with D6 HP. 3 failures = death."
              - paragraph [ref=e738]: Dragon on death roll = 2 successes. Demon on death roll = 2 failures.
              - paragraph [ref=e739]: Taking damage at 0 HP = automatic failed death roll.
              - paragraph [ref=e740]: "Instant death: A single attack reduces HP to negative of max HP."
              - paragraph [ref=e741]: "After recovery: Roll CON. Failure = permanent injury (D10 table)."
          - generic [ref=e743]:
            - button "Encumbrance p. 28" [expanded] [ref=e744] [cursor=pointer]:
              - heading "Encumbrance p. 28" [level=3] [ref=e745]:
                - text: Encumbrance
                - generic [ref=e746]: p. 28
              - img [ref=e748]
            - generic [ref=e753]:
              - paragraph [ref=e754]: Carry up to STR / 2 (rounded up) items in inventory.
              - paragraph [ref=e755]: Weapons at hand (up to 3) and worn armor/helmet don't count against slots.
              - paragraph [ref=e756]: 4 rations = 1 slot. Under 100 coins = free, 100-199 = 1 slot.
              - paragraph [ref=e757]: "Over-encumbered: STR roll to move each round/shift. Fail = drop items or stay put."
          - generic [ref=e759]:
            - button "Combat Round Structure p. 41" [expanded] [ref=e760] [cursor=pointer]:
              - heading "Combat Round Structure p. 41" [level=3] [ref=e761]:
                - text: Combat Round Structure
                - generic [ref=e762]: p. 41
              - img [ref=e764]
            - generic [ref=e769]:
              - paragraph [ref=e770]: 1. Draw initiative cards (1-10) — one per character. Lowest acts first.
              - paragraph [ref=e771]: "2. Each turn: one free movement (10m) + one action."
              - paragraph [ref=e772]: 3. After acting or reacting, flip card face-down — no further reactions allowed.
              - paragraph [ref=e773]: "4. Wait: Swap initiative card with a later creature (they can't refuse). Monsters never wait."
              - paragraph [ref=e774]: 5. Cards are redrawn every round.
          - generic [ref=e776]:
