              - generic [ref=e793]:
                - generic [ref=e794]: Ranged Attack
                - generic [ref=e795]: Against targets within the weapon's range.
              - generic [ref=e796]:
                - generic [ref=e797]: Parry
                - generic [ref=e798]: Parry melee/ranged (ranged requires shield). Reaction, replaces your action.
              - generic [ref=e799]:
                - generic [ref=e800]: Dodge
                - generic [ref=e801]: Dodge melee or ranged attacks. Also a reaction.
              - generic [ref=e802]:
