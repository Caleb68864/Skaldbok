              - paragraph [ref=e5411]: "Pushing: After a failed skill/attribute roll, reroll (with boon/bane = reroll both dice). New result applies. You always suffer a condition of your choice (can't pick one you already have). Cannot push a Demon (20). All 6 conditions = no more pushing. Only PCs can push."
