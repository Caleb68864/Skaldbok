              - generic [ref=e5576]: ▲
            - generic [ref=e5578]:
              - paragraph [ref=e5579]: "At 0 HP: Make a CON death roll each round. 3 successes = recover with D6 HP. 3 failures = death."
              - paragraph [ref=e5580]: Dragon on death roll = 2 successes. Demon on death roll = 2 failures.
              - paragraph [ref=e5581]: Taking damage at 0 HP = automatic failed death roll.
              - paragraph [ref=e5582]: "Instant death: A single attack reduces HP to negative of max HP."
              - paragraph [ref=e5583]: "After recovery: Roll CON. Failure = permanent injury (D10 table)."
          - generic [ref=e5585]:
            - button "Encumbrance p. 28 ▲" [expanded] [ref=e5586] [cursor=pointer]:
              - heading "Encumbrance p. 28" [level=3] [ref=e5587]:
                - text: Encumbrance
                - generic [ref=e5588]: p. 28
              - generic [ref=e5589]: ▲
            - generic [ref=e5591]:
              - paragraph [ref=e5592]: Carry up to STR / 2 (rounded up) items in inventory.
              - paragraph [ref=e5593]: Weapons at hand (up to 3) and worn armor/helmet don't count against slots.
              - paragraph [ref=e5594]: 4 rations = 1 slot. Under 100 coins = free, 100-199 = 1 slot.
              - paragraph [ref=e5595]: "Over-encumbered: STR roll to move each round/shift. Fail = drop items or stay put."
          - generic [ref=e5597]:
            - button "Combat Round Structure p. 41 ▲" [expanded] [ref=e5598] [cursor=pointer]:
              - heading "Combat Round Structure p. 41" [level=3] [ref=e5599]:
                - text: Combat Round Structure
                - generic [ref=e5600]: p. 41
              - generic [ref=e5601]: ▲
            - generic [ref=e5603]:
              - paragraph [ref=e5604]: 1. Draw initiative cards (1-10) — one per character. Lowest acts first.
              - paragraph [ref=e5605]: "2. Each turn: one free movement (10m) + one action."
              - paragraph [ref=e5606]: 3. After acting or reacting, flip card face-down — no further reactions allowed.
              - paragraph [ref=e5607]: "4. Wait: Swap initiative card with a later creature (they can't refuse). Monsters never wait."
              - paragraph [ref=e5608]: 5. Cards are redrawn every round.
