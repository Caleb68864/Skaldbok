            - generic [ref=e357]:
              - paragraph [ref=e358]: "At 0 HP: Make a CON death roll each round. 3 successes = recover with D6 HP. 3 failures = death."
              - paragraph [ref=e359]: Dragon on death roll = 2 successes. Demon on death roll = 2 failures.
              - paragraph [ref=e360]: Taking damage at 0 HP = automatic failed death roll.
              - paragraph [ref=e361]: "Instant death: A single attack reduces HP to negative of max HP."
              - paragraph [ref=e362]: "After recovery: Roll CON. Failure = permanent injury (D10 table)."
          - generic [ref=e364]:
            - button "Encumbrance p. 28" [expanded] [ref=e365] [cursor=pointer]:
              - heading "Encumbrance p. 28" [level=3] [ref=e366]:
                - text: Encumbrance
                - generic [ref=e367]: p. 28
              - img [ref=e369]
            - generic [ref=e374]:
              - paragraph [ref=e375]: Carry up to STR / 2 (rounded up) items in inventory.
              - paragraph [ref=e376]: Weapons at hand (up to 3) and worn armor/helmet don't count against slots.
              - paragraph [ref=e377]: 4 rations = 1 slot. Under 100 coins = free, 100-199 = 1 slot.
              - paragraph [ref=e378]: "Over-encumbered: STR roll to move each round/shift. Fail = drop items or stay put."
          - generic [ref=e380]:
            - button "Combat Round Structure p. 41" [expanded] [ref=e381] [cursor=pointer]:
              - heading "Combat Round Structure p. 41" [level=3] [ref=e382]:
                - text: Combat Round Structure
                - generic [ref=e383]: p. 41
              - img [ref=e385]
            - generic [ref=e390]:
              - paragraph [ref=e391]: 1. Draw initiative cards (1-10) — one per character. Lowest acts first.
              - paragraph [ref=e392]: "2. Each turn: one free movement (10m) + one action."
              - paragraph [ref=e393]: 3. After acting or reacting, flip card face-down — no further reactions allowed.
              - paragraph [ref=e394]: "4. Wait: Swap initiative card with a later creature (they can't refuse). Monsters never wait."
              - paragraph [ref=e395]: 5. Cards are redrawn every round.
          - generic [ref=e397]:
