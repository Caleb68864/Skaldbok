                - generic [ref=e413]: Against enemy within 2m (4m for long weapons).
              - generic [ref=e414]:
                - generic [ref=e415]: Ranged Attack
                - generic [ref=e416]: Against targets within the weapon's range.
              - generic [ref=e417]:
                - generic [ref=e418]: Parry
                - generic [ref=e419]: Parry melee/ranged (ranged requires shield). Reaction, replaces your action.
              - generic [ref=e420]:
                - generic [ref=e421]: Dodge
                - generic [ref=e422]: Dodge melee or ranged attacks. Also a reaction.
              - generic [ref=e423]:
                - generic [ref=e424]: Pick Up Item
                - generic [ref=e425]: Pick up item within 2m, or from your inventory.
              - generic [ref=e426]:
                - generic [ref=e427]: Equip Armor
                - generic [ref=e428]: Put on or remove armor/helmet.
              - generic [ref=e429]:
