            - generic [ref=e320]:
              - paragraph [ref=e321]: "At 0 HP: Make a CON death roll each round. 3 successes = recover with D6 HP. 3 failures = death."
              - paragraph [ref=e322]: Dragon on death roll = 2 successes. Demon on death roll = 2 failures.
              - paragraph [ref=e323]: Taking damage at 0 HP = automatic failed death roll.
              - paragraph [ref=e324]: "Instant death: A single attack reduces HP to negative of max HP."
              - paragraph [ref=e325]: "After recovery: Roll CON. Failure = permanent injury (D10 table)."
          - generic [ref=e327]:
            - button "Encumbrance p. 28 ▲" [expanded] [ref=e328] [cursor=pointer]:
              - heading "Encumbrance p. 28" [level=3] [ref=e329]:
                - text: Encumbrance
                - generic [ref=e330]: p. 28
              - generic [ref=e331]: ▲
            - generic [ref=e333]:
              - paragraph [ref=e334]: Carry up to STR / 2 (rounded up) items in inventory.
              - paragraph [ref=e335]: Weapons at hand (up to 3) and worn armor/helmet don't count against slots.
              - paragraph [ref=e336]: 4 rations = 1 slot. Under 100 coins = free, 100-199 = 1 slot.
              - paragraph [ref=e337]: "Over-encumbered: STR roll to move each round/shift. Fail = drop items or stay put."
          - generic [ref=e339]:
            - button "Combat Round Structure p. 41 ▲" [expanded] [ref=e340] [cursor=pointer]:
              - heading "Combat Round Structure p. 41" [level=3] [ref=e341]:
                - text: Combat Round Structure
                - generic [ref=e342]: p. 41
              - generic [ref=e343]: ▲
            - generic [ref=e345]:
              - paragraph [ref=e346]: 1. Draw initiative cards (1-10) — one per character. Lowest acts first.
              - paragraph [ref=e347]: "2. Each turn: one free movement (10m) + one action."
              - paragraph [ref=e348]: 3. After acting or reacting, flip card face-down — no further reactions allowed.
              - paragraph [ref=e349]: "4. Wait: Swap initiative card with a later creature (they can't refuse). Monsters never wait."
              - paragraph [ref=e350]: 5. Cards are redrawn every round.
          - generic [ref=e352]:
