                - generic [ref=e370]: Parry melee/ranged (ranged requires shield). Reaction, replaces your action.
              - generic [ref=e371]:
                - generic [ref=e372]: Dodge
                - generic [ref=e373]: Dodge melee or ranged attacks. Also a reaction.
              - generic [ref=e374]:
